name: Create co-authored automation change

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  create-change:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create a transparent co-authored change
        run: |
          git switch -c automation/pair-extraordinaire
          cat > AUTOMATION.md <<'EOF'
          # Automation pairing record

          This file was generated by the repository's GitHub Actions workflow to
          demonstrate a real human/automation co-authored change in a transparent
          achievement-learning sandbox.
          EOF
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add AUTOMATION.md
          git commit \
            --author="William <217792102+WillieTheWhale@users.noreply.github.com>" \
            -m "Document the human/automation pairing experiment" \
            -m "Co-authored-by: github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>"
          git push --set-upstream origin automation/pair-extraordinaire
