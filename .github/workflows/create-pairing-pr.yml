name: Create co-authored automation change

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  create-change:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create a transparent co-authored change
        run: |
          git switch -c automation/pair-extraordinaire-reciprocal
          cat > RECIPROCAL-PAIRING.md <<'EOF'
          # Reciprocal automation pairing record

          GitHub Actions generated and committed this file from a workflow designed
          and initiated by William. The commit records the bot as author and William
          as co-author so both sides of the collaboration are explicit.
          EOF
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add RECIPROCAL-PAIRING.md
          git commit \
            -m "Record the reciprocal automation pairing experiment" \
            -m "Co-authored-by: William <217792102+WillieTheWhale@users.noreply.github.com>"
          git push --set-upstream origin automation/pair-extraordinaire-reciprocal
