name: TreasureHunt source and archive discovery

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/treasure-hunt-discovery.yml'
      - 'treasure-discovery/**'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  discover:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4
      - name: Search public repositories and archives
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euxo pipefail
          mkdir -p treasure-discovery/{api,repos,archive,results}
          python3 - <<'PY'
          import json, os, pathlib, urllib.parse, urllib.request, time
          out=pathlib.Path('treasure-discovery/api'); out.mkdir(parents=True,exist_ok=True)
          token=os.environ.get('GH_TOKEN','')
          hdr={'Accept':'application/vnd.github+json','User-Agent':'treasure-discovery'}
          if token: hdr['Authorization']='Bearer '+token
          def get(url):
            req=urllib.request.Request(url,headers=hdr)
            with urllib.request.urlopen(req,timeout=90) as r:return json.load(r)
          accounts=[('user','sampullman'),('org','pledgecamp')]
          repos=[]
          for kind,name in accounts:
            endpoint=('users' if kind=='user' else 'orgs')+f'/{name}/repos?per_page=100&type=all'
            try:
              data=get('https://api.github.com/'+endpoint)
              (out/f'{name}-repos.json').write_text(json.dumps(data,indent=2)+'\n')
              repos.extend(x['clone_url'] for x in data if not x.get('fork'))
            except Exception as e: print('repo list failed',name,repr(e))
          # Search GitHub's indexed public code and commits for exact identifiers and likely client code.
          queries=[
            '"A contract for enforcing a treasure hunt"',
            '"0x0fa5beca6764fc7706d3a46bd5017fad88357a0a"',
            '"submitLocation" "encryptKey"',
            '"locationsLength" "checkWin" "decryptKeys"',
            '"78d8911025bf14e90b8566da2eb0ba4d03087a838b63e81d9319f941e4bfcb02"',
          ]
          for i,q in enumerate(queries):
            for typ in ['code','commits']:
              try:
                url='https://api.github.com/search/'+typ+'?per_page=100&q='+urllib.parse.quote(q)
                data=get(url)
                (out/f'search-{typ}-{i}.json').write_text(json.dumps(data,indent=2)+'\n')
              except Exception as e: print('search failed',typ,q,repr(e))
              time.sleep(1)
          pathlib.Path('treasure-discovery/results/repo-urls.txt').write_text('\n'.join(sorted(set(repos)))+'\n')
          PY

          while IFS= read -r url; do
            [ -n "$url" ] || continue
            name=$(echo "$url" | sed -E 's#https://github.com/##;s#\.git$##;s#/#__#')
            git clone --mirror "$url" "treasure-discovery/repos/$name.git" || true
          done < treasure-discovery/results/repo-urls.txt

          : > treasure-discovery/results/git-hits.txt
          for repo in treasure-discovery/repos/*.git; do
            [ -d "$repo" ] || continue
            echo "===== $repo =====" >> treasure-discovery/results/git-hits.txt
            git -C "$repo" log --all --oneline --decorate --regexp-ignore-case \
              --grep='treasure\|hunt\|encryptKey\|submitLocation' >> treasure-discovery/results/git-hits.txt || true
            git -C "$repo" rev-list --all | while read rev; do
              git -C "$repo" grep -n -I -E \
                '0fa5beca|TreasureHunt|submitLocation|encryptKey|decryptKeys|78d8911025bf14e9|449003c87c7ca964' \
                "$rev" 2>/dev/null && break || true
            done >> treasure-discovery/results/git-hits.txt
          done

          # Wayback CDX inventories for likely project domains. Save URL lists and fetch text-like snapshots with hunt terms.
          for domain in pledgecamp.com pledgecamp.io podolabs.com podo.com; do
            curl -fsSL --retry 2 -A 'Mozilla/5.0' \
              "https://web.archive.org/cdx/search/cdx?url=${domain}/*&output=json&fl=timestamp,original,statuscode,mimetype,digest&filter=statuscode:200&collapse=digest&from=2018&to=2021" \
              -o "treasure-discovery/archive/${domain}.cdx.json" || true
          done
          python3 - <<'PY'
          import json,pathlib,re,subprocess,urllib.parse,urllib.request
          root=pathlib.Path('treasure-discovery/archive')
          hits=[]
          for p in root.glob('*.cdx.json'):
            try: rows=json.load(open(p))
            except Exception: continue
            if len(rows)<2: continue
            for row in rows[1:]:
              ts,url,status,mime,digest=row
              low=url.lower()
              if any(k in low for k in ['treasure','hunt','ethereum','blockchain','contract','game','qr','location']):
                hits.append((ts,url,mime))
          pathlib.Path('treasure-discovery/results/archive-candidate-urls.tsv').write_text(''.join(f'{a}\t{b}\t{c}\n' for a,b,c in hits))
          for i,(ts,url,mime) in enumerate(hits[:500]):
            if not any(x in mime for x in ['html','json','javascript','text']): continue
            snap=f'https://web.archive.org/web/{ts}id_/{url}'
            try:
              req=urllib.request.Request(snap,headers={'User-Agent':'Mozilla/5.0'})
              data=urllib.request.urlopen(req,timeout=45).read()
              if re.search(b'treasure|submitLocation|encryptKey|0fa5beca|decryptKeys',data,re.I):
                q=root/f'hit-{i:04d}.bin';q.write_bytes(data)
            except Exception: pass
          PY

          grep -RInaE 'treasure|submitLocation|encryptKey|decryptKeys|0fa5beca|78d8911025bf14e9' treasure-discovery/archive treasure-discovery/api \
            > treasure-discovery/results/all-text-hits.txt || true

      - name: Upload discovery corpus
        uses: actions/upload-artifact@v4
        with:
          name: treasure-hunt-discovery
          path: treasure-discovery
          retention-days: 3
          if-no-files-found: error
