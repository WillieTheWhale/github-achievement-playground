name: TreasureHunt password candidate scan

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/treasure-hunt-password-crack.yml'
      - 'treasure-passwords/**'
      - 'treasure-discovery/crack_treasure.c'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  crack:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4
      - name: Download candidate dictionaries
        run: |
          set -euxo pipefail
          mkdir -p treasure-passwords/lists treasure-passwords/out
          curl -fL --retry 3 -o treasure-passwords/lists/top-million.txt \
            https://raw.githubusercontent.com/danielmiessler/SecLists/master/Passwords/Common-Credentials/10-million-password-list-top-1000000.txt
          curl -fL --retry 3 -o treasure-passwords/lists/rockyou.txt \
            https://github.com/brannondorsey/naive-hashcat/releases/download/data/rockyou.txt
          curl -fL --retry 3 -o treasure-passwords/lists/english.txt \
            https://raw.githubusercontent.com/dwyl/english-words/master/words_alpha.txt
          python3 - <<'PY'
          from pathlib import Path
          out=Path('treasure-passwords/lists/generated.txt')
          terms=['treasure','treasurehunt','hunt','hunter','location','ethereum','ether','crypto','blockchain','pledgecamp','pledge','camp','podo','podolabs','podo labs','sanfrancisco','san francisco','sf','oakland','berkeley','sam','samuel','pullman','john','fitzpatrick','password','secret','test','admin']
          c=set(str(i) for i in range(1_000_000))
          for b in terms:
            for v in {b,b.lower(),b.upper(),b.title(),b.replace(' ',''),b.replace(' ','_'),b.replace(' ','-')}:
              for s in ['','1','12','123','1234','2018','2019','2020','2021','!','123!','01','007','69','420']:
                c.add(v+s)
          out.write_text('\n'.join(sorted(c))+'\n')
          print('generated',len(c))
          PY
          wc -l treasure-passwords/lists/*

      - name: Compile and run exact Keccak candidate tester
        run: |
          set -euxo pipefail
          gcc -O3 -march=native treasure-discovery/crack_treasure.c -lcrypto -o treasure-passwords/crack
          : > treasure-passwords/out/results.txt
          for f in treasure-passwords/lists/*.txt; do
            echo "===== $f =====" | tee -a treasure-passwords/out/results.txt
            /usr/bin/time -v treasure-passwords/crack "$f" treasure-passwords/out/results.txt \
              2>> treasure-passwords/out/timing.txt
          done
          cat treasure-passwords/out/results.txt

      - name: Upload password scan
        uses: actions/upload-artifact@v4
        with:
          name: treasure-hunt-password-scan
          path: treasure-passwords/out
          retention-days: 3
          if-no-files-found: error
